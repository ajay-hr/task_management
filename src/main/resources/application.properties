spring.application.name=task-management-api
server.port=${SERVER_PORT:7001}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/task_management}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

jwt.secret=${JWT_SECRET:change-this-secret-to-at-least-32-characters}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:false}

app.mail.from=${MAIL_FROM:no-reply@taskmanagement.local}
app.reminders.enabled=${REMINDERS_ENABLED:true}
app.reminders.cron=${REMINDERS_CRON:0 0 * * * *}
