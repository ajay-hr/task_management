spring.datasource.url=jdbc:h2:mem:task_management;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

jwt.secret=test-secret-key-for-task-management-api-32
jwt.access-expiration-ms=900000
jwt.refresh-expiration-ms=604800000

app.reminders.enabled=false
app.reminders.cron=0 0 * * * *

spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=no-reply@taskmanagement.local
